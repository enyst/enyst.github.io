primary:
  name: Technical peers
  description: Software engineers, open source maintainers, and AI agent builders who want to understand how real systems work — not marketing abstractions
  needs: Technical depth, honest architecture decisions, real diagrams
  current_solution: Reading source code directly, or blog posts that oversimplify
  why_us: The work is published at the level of detail they actually need, in formats they can act on

secondary:
  name: Potential collaborators and employers
  description: People evaluating Engel's technical judgment — hiring managers, co-founder candidates, open source project leads, accelerator reviewers
  needs: Evidence of competence, taste, and follow-through
  current_solution: GitHub profile, LinkedIn, resume
  why_us: The site shows the thinking behind the code, not just the code. Architecture decisions, investigation methodology, system design — the stuff a GitHub profile can't convey

tertiary:
  name: AI agent enthusiasts
  description: People interested in where AI agents are going — memory, autonomy, local-first, UX for non-developers
  needs: Thoughtful takes, working prototypes, not hype
  current_solution: Twitter threads, blog posts, papers
  why_us: SmolPaws is a working autonomous agent, not a demo. The site publishes its real architecture.
